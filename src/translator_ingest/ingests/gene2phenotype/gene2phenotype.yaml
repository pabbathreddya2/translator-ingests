name: gene2phenotype

reader:
  format: "csv"
  delimiter: ","    ## comma-delimited
  header_mode: 0    ## first row is column names
  files:
    - "G2P_all.csv"
  ## including all the ones I want to use
  ## Not sure if I'm supposed to include all column names in the file instead
  columns:
    - "g2p id"
    - "hgnc id": str
    - "disease mim": str
    - "disease MONDO"
    - "allelic requirement"
    - "confidence"
    - "molecular mechanism"
    - "publications"
    - "date of last review"

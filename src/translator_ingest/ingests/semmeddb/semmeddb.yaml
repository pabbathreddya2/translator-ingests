name: semmeddb
metadata: !include './metadata.yaml'

readers:
  filter_edges:
    format: jsonl
    files:
      - kg2.10.3-semmeddb-edges.jsonl.gz
    filters:
      - inclusion: include
        column: predicate
        filter_code: in_exact
        value:
          - "biolink:affects"
          - "biolink:causes"
          - "biolink:close_match"
          - "biolink:coexists_with"
          - "biolink:derives_from"
          - "biolink:diagnoses"
          - "biolink:disrupts"
          - "biolink:exacerbates_condition"
          - "biolink:has_input"
          - "biolink:has_part"
          - "biolink:interacts_with"
          - "biolink:located_in"
          - "biolink:manifestation_of"
          - "biolink:occurs_in"
          - "biolink:precedes"
          - "biolink:predisposes_to_condition"
          - "biolink:preventative_for_condition"
          - "biolink:produces"
          - "biolink:related_to"
          - "biolink:treats_or_applied_or_studied_to_treat"

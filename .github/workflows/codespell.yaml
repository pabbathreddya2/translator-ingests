---
name: Codespell

on:
  push:
    branches: [main]
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    - ready_for_review

permissions:
  contents: read

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Codespell
        uses: codespell-project/actions-codespell@v2
        with:
          # Match Makefile CODESPELL_SKIP. **/*.ipynb: notebook outputs use base64 blobs and
          # truncated HTML/table strings that split words mid-token—high false-positive rate for codespell.
          skip: ./data/*,**/site-packages,**/*.ipynb
          ignore_words_file: .codespellignore

